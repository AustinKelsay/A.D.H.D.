<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADHD</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Trebuchet MS", "Segoe UI", Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, #f4f7ff 0%, transparent 35%),
          linear-gradient(160deg, #f8fafc, #eef2ff);
        color: #0f172a;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      .status-chip {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: #dbeafe;
        color: #1e40af;
        font-weight: 600;
        font-size: 12px;
      }

      .session-grid {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }

      .session {
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(4px);
      }

      .session h3 {
        margin: 0;
      }

      .session-line {
        margin: 6px 0;
      }

      .session-controls {
        display: flex;
        gap: 8px;
        margin: 8px 0;
        flex-wrap: wrap;
      }

      .session-control {
        border: 1px solid #1e3a8a;
        background: #dbeafe;
        color: #1e3a8a;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .session-control:hover {
        background: #bfdbfe;
      }

      .session-control.danger {
        border-color: #b91c1c;
        background: #fee2e2;
        color: #7f1d1d;
      }

      .session-control.danger:hover {
        background: #fecaca;
      }

      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        background: #020617;
        color: #d1fae5;
        border-radius: 8px;
        padding: 8px;
        max-height: 170px;
        overflow: auto;
      }

      .muted {
        opacity: 0.75;
      }

      details {
        margin: 8px 0;
      }

      details summary {
        cursor: pointer;
        color: #1d4ed8;
        font-weight: 600;
      }

      .session-details {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.65);
      }

      .timeline {
        margin: 0;
        padding-left: 18px;
      }

      .timeline li {
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ADHD Session Console</h1>
      <p>
        <span id="connection-state" class="status-chip">Initializing status stream…</span>
      </p>
      <p>
        Live updates stream from <code>/api/sessions/events</code>. If streaming fails,
        the page falls back to 1s polling.
      </p>
      <section>
        <h2>Sessions</h2>
        <div id="session-list" class="session-grid"></div>
      </section>
    </main>

    <script>
      const state = {
        sessions: new Map(),
        pollingHandle: null,
        streamErrorCount: 0,
      };
      const RERUN_PROFILES = ['basic', 'edit', 'git', 'release'];

      const sessionListElement = document.getElementById('session-list');
      const connectionStateElement = document.getElementById('connection-state');

      const stateToEmoji = {
        queued: '🟦',
        awaiting_confirmation: '🟧',
        starting: '🟪',
        running: '🟩',
        completed: '✅',
        failed: '❌',
        cancelled: '⛔',
      };

      function formatTime(value) {
        if (!value) return 'n/a';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return 'invalid';
        return date.toLocaleTimeString();
      }

      function sanitizeText(value) {
        return String(value || '').trim() || 'n/a';
      }

      function formatDuration(ms) {
        const durationMs = Number(ms);
        if (!Number.isFinite(durationMs) || durationMs < 0) return 'n/a';
        const totalSeconds = Math.max(0, Math.round(durationMs / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        if (minutes) return `${minutes}m ${seconds}s`;
        return `${seconds}s`;
      }

      function createControlButton(sessionId, action, label, styleType, bodyFactory) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `session-control ${styleType || ''}`.trim();
        button.textContent = label;
        button.addEventListener('click', async () => {
          try {
            const requestBody = typeof bodyFactory === 'function'
              ? bodyFactory()
              : {};
            if (requestBody === null) {
              return;
            }

            const response = await fetch(`/api/sessions/${sessionId}/${action}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(requestBody),
            });

            const body = await response.json().catch(() => ({}));
            if (body?.session) {
              updateFromPayload(body.session);
            }
            if (!response.ok) {
              return;
            }
            if ((action === 'retry' || action === 'rerun') && body?.session) {
              updateFromPayload(body.session);
            }
          } catch {
            // control action failed; no auto retry in UI
          }
        });
        return button;
      }

      function buildTimeline(session) {
        const history = Array.isArray(session.stateHistory) ? session.stateHistory : [];
        if (!history.length) return null;

        const wrapper = document.createElement('div');
        wrapper.className = 'session-details';
        const title = document.createElement('p');
        title.className = 'muted';
        title.textContent = 'Lifecycle timeline';
        wrapper.appendChild(title);

        const list = document.createElement('ul');
        list.className = 'timeline';

        for (const entry of history) {
          const item = document.createElement('li');
          const from = sanitizeText(entry.from || 'none');
          const to = sanitizeText(entry.to);
          const reason = sanitizeText(entry.reason);
          item.textContent = `${formatTime(entry.at)} · ${from} → ${to} (${reason})`;
          list.appendChild(item);
        }

        wrapper.appendChild(list);
        return wrapper;
      }

      function buildSummary(session) {
        if (!session.summary) return null;

        const wrapper = document.createElement('div');
        wrapper.className = 'session-details';

        const title = document.createElement('p');
        title.className = 'muted';
        title.textContent = 'Run summary';
        wrapper.appendChild(title);

        const line = document.createElement('p');
        line.className = 'session-line';
        line.textContent = `Duration: ${formatDuration(session.summary.durationMs)} | Exit code: ${sanitizeText(session.summary.exitCode)}`;
        wrapper.appendChild(line);

        const status = document.createElement('p');
        status.className = 'session-line muted';
        status.textContent = `Failed: ${sanitizeText(session.summary.failed)} | Error category: ${sanitizeText(session.summary.errorCategory)} | Failure reason: ${sanitizeText(session.summary.failureReason)}`;
        wrapper.appendChild(status);

        const output = document.createElement('p');
        const outputLink = document.createElement('a');
        outputLink.href = `/api/sessions/${session.sessionId}/output`;
        outputLink.target = '_blank';
        outputLink.rel = 'noopener noreferrer';
        outputLink.textContent = 'Open output';
        output.appendChild(outputLink);

        const stdoutLink = document.createElement('a');
        stdoutLink.href = `/api/sessions/${session.sessionId}/output?stream=stdout`;
        stdoutLink.target = '_blank';
        stdoutLink.rel = 'noopener noreferrer';
        stdoutLink.textContent = 'Open stdout';
        output.appendChild(document.createTextNode(' | '));
        output.appendChild(stdoutLink);

        const hasStderr = sanitizeText(session.runtime?.output?.stderr || '').length > 0;
        if (hasStderr) {
          const stderrLink = document.createElement('a');
          stderrLink.href = `/api/sessions/${session.sessionId}/output?stream=stderr`;
          stderrLink.target = '_blank';
          stderrLink.rel = 'noopener noreferrer';
          stderrLink.textContent = 'Open stderr';
          output.appendChild(document.createTextNode(' | '));
          output.appendChild(stderrLink);
        }

        wrapper.appendChild(output);
        return wrapper;
      }

      function updateFromPayload(session) {
        if (!session || !session.sessionId) return;
        state.sessions.set(session.sessionId, session);
        renderSessions();
      }

      function renderSession(session) {
        const card = document.createElement('article');
        card.className = 'session';

        const output = `${sanitizeText(session.runtime?.output?.stdout || '')}${sanitizeText(session.runtime?.output?.stderr || '')}`;
        const cardTitle = document.createElement('h3');
        cardTitle.textContent = `${stateToEmoji[session.state] || '🟪'} ${session.sessionId}`;

        const profile = document.createElement('p');
        profile.className = 'session-line';
        profile.textContent = `Profile: ${session.profile} | State: ${session.state}`;

        const task = document.createElement('p');
        task.className = 'session-line';
        task.textContent = `Task: ${sanitizeText(session.taskIntent?.normalizedText || session.task)}`;

        const target = document.createElement('p');
        target.className = 'session-line muted';
        target.textContent = `Target: ${sanitizeText(session.workingDirectory)}`;

        const timing = document.createElement('p');
        timing.className = 'session-line muted';
        timing.textContent = `Started: ${formatTime(session.runtime?.startedAt)} | Updated: ${formatTime(session.updatedAt)} | Completed: ${formatTime(session.completedAt)}`;

        const reason = document.createElement('p');
        reason.className = 'session-line muted';
        reason.textContent = `Reason: ${sanitizeText(session.runtime?.error || 'ready')}`;

        const controls = document.createElement('div');
        controls.className = 'session-controls';
        if (session.state === 'running') {
          controls.appendChild(createControlButton(session.sessionId, 'stop', 'Cancel', 'danger'));
        } else if (session.state === 'queued' || session.state === 'awaiting_confirmation' || session.state === 'starting') {
          controls.appendChild(createControlButton(session.sessionId, 'cancel', 'Cancel', 'danger'));
        }
        if (session.state === 'failed') {
          controls.appendChild(createControlButton(session.sessionId, 'retry', 'Retry', '', () => ({})));
        }
        if (session.state === 'completed' || session.state === 'failed') {
          const requestedProfile = session.profile;
          controls.appendChild(createControlButton(
            session.sessionId,
            'rerun',
            'Rerun',
            '',
            () => {
              const profileText = window.prompt(
                `Optional profile override for rerun. Leave blank to use "${requestedProfile}".`,
                requestedProfile || 'basic',
              );
              if (profileText === null) return null;
              const normalizedProfile = String(profileText).trim().toLowerCase();
              if (!normalizedProfile || normalizedProfile === requestedProfile) {
                return {};
              }
              if (!RERUN_PROFILES.includes(normalizedProfile)) {
                alert(`Unknown profile: ${normalizedProfile}`);
                return null;
              }
              return { profile: normalizedProfile };
            },
          ));
        }

        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = 'Details';
        details.appendChild(summary);

        const summaryBlock = buildSummary(session);
        if (summaryBlock) {
          details.appendChild(summaryBlock);
        }

        const timeline = buildTimeline(session);
        if (timeline) {
          details.appendChild(timeline);
        }

        const outputBlock = document.createElement('pre');
        outputBlock.className = 'mono';
        outputBlock.textContent = output.slice(-16000);

        card.appendChild(cardTitle);
        card.appendChild(profile);
        card.appendChild(task);
        card.appendChild(target);
        card.appendChild(timing);
        card.appendChild(reason);
        card.appendChild(controls);
        card.appendChild(details);
        card.appendChild(outputBlock);
        return card;
      }

      function renderSessions() {
        sessionListElement.innerHTML = '';
        const sessions = [...state.sessions.values()];

        if (!sessions.length) {
          const empty = document.createElement('p');
          empty.className = 'muted';
          empty.textContent = 'No sessions yet. Create one via API or another client.';
          sessionListElement.appendChild(empty);
          return;
        }

        for (const session of sessions.sort((left, right) =>
          new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime(),
        )) {
          sessionListElement.appendChild(renderSession(session));
        }
      }

      function setConnectionState(message) {
        connectionStateElement.textContent = message;
      }

      function applySessionEvent(eventPayload) {
        const payload = eventPayload || {};
        if (!payload) return;

        if (payload.sessions) {
          state.sessions.clear();
          for (const item of payload.sessions) {
            updateFromPayload(item);
          }
          return;
        }

        if (payload.session) {
          updateFromPayload(payload.session);
          return;
        }

        if (payload.sessionId && state.sessions.has(payload.sessionId)) {
          const current = state.sessions.get(payload.sessionId);
          state.sessions.set(payload.sessionId, {
            ...current,
            runtime: {
              ...(current.runtime || {}),
              ...(payload.output || {}),
            },
            ...payload,
          });
          renderSessions();
        }
      }

      async function refreshSessions() {
        try {
          const response = await fetch('/api/sessions');
          const body = await response.json();
          if (!response.ok || !body.ok) {
            return;
          }
          state.sessions.clear();
          for (const item of body.sessions || []) {
            updateFromPayload(item);
          }
          setConnectionState('REST fallback polling active (1s)');
        } catch {
          // ignore transient polling errors
        }
      }

      function startPollingFallback() {
        if (state.pollingHandle) return;
        state.pollingHandle = setInterval(() => {
          refreshSessions();
        }, 1000);
        refreshSessions();
      }

      function startStream() {
        const source = new EventSource('/api/sessions/events');

        source.addEventListener('snapshot', (event) => {
          setConnectionState('SSE connected');
          state.streamErrorCount = 0;
          try {
            applySessionEvent(JSON.parse(event.data || '{}'));
          } catch {
            // ignore malformed events
          }
        });

        source.addEventListener('session-state', (event) => {
          try {
            applySessionEvent(JSON.parse(event.data || '{}'));
          } catch {
            // ignore malformed events
          }
        });

        source.addEventListener('session-output', (event) => {
          try {
            const payload = JSON.parse(event.data || '{}');
            if (!payload.sessionId) return;

            const current = state.sessions.get(payload.sessionId) || {
              sessionId: payload.sessionId,
            };
            state.sessions.set(payload.sessionId, {
              ...current,
              runtime: {
                ...current.runtime,
                ...(current.runtime || {}),
                ...(payload.output || {}),
              },
            });
            renderSessions();
          } catch {
            // ignore malformed events
          }
        });

        source.onerror = () => {
          state.streamErrorCount += 1;
          if (state.streamErrorCount >= 2) {
            setConnectionState('SSE unavailable, switching to polling');
            source.close();
            startPollingFallback();
          }
        };
      }

      startStream();
    </script>
  </body>
</html>
